name: Bug report
description: Report a problem in the HarmonyOS account book app.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps that trigger the problem.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / Emulator
      placeholder: HarmonyOS emulator, API 14
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Attach hilog snippets, screenshots, or screen recordings if available.
